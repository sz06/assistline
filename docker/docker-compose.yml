name: assistline

services:
  # 1. Matrix Homeserver (Dendrite)
  dendrite:
    image: matrixdotorg/dendrite-monolith:latest
    container_name: dendrite
    restart: unless-stopped
    ports:
      - "8008:8008"   # Expose media API so the browser can load QR code images
    volumes:
      - ${ASSISTLINE_DATA:-./assistline-data}/dendrite:/var/dendrite
      - ./dendrite.yaml:/etc/dendrite/dendrite.yaml
      - ${ASSISTLINE_DATA:-./assistline-data}/mautrix-whatsapp/registration.yaml:/etc/dendrite/whatsapp-registration.yaml
    environment:
      - SERVER_NAME=${DENDRITE_SERVER_NAME:-matrix.local}
    networks:
      - assistline-net

  # 2. Mautrix WhatsApp Bridge
  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    container_name: mautrix-whatsapp
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "cd /data && /usr/bin/mautrix-whatsapp --ignore-unsupported-server"]
    volumes:
      - ${ASSISTLINE_DATA:-./assistline-data}/mautrix-whatsapp:/data
    networks:
      - assistline-net
    depends_on:
      - dendrite

  # 3. Convex Self-Hosted Backend
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: convex-backend
    restart: unless-stopped
    ports:
      - "3410:3210"   # Host 3410 → Container 3210 (avoids conflict with local convex dev)
      - "3411:3211"
    volumes:
      - ${ASSISTLINE_DATA:-./assistline-data}/convex:/convex/data
    environment:
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211
    networks:
      - assistline-net

  # 4. AssistLine Init (runs once — sets up Matrix bot + deploys Convex functions)
  assistline-init:
    build:
      context: ..
      dockerfile: docker/assistline-init/Dockerfile
    container_name: assistline-init
    restart: "no"
    volumes:
      - ${ASSISTLINE_DATA:-./assistline-data}/convex/credentials:/convex-credentials:ro
      - convex-shared:/shared-convex
      - matrix-shared:/shared-matrix
      - ../packages/api:/app/packages/api:ro
      - ../packages/config:/app/packages/config:ro
    environment:
      - MATRIX_HOMESERVER_URL=http://dendrite:8008
      - DENDRITE_SERVER_NAME=${DENDRITE_SERVER_NAME:-matrix.local}
      - DENDRITE_SHARED_SECRET=${DENDRITE_SHARED_SECRET}
      - MATRIX_BOT_USERNAME=${MATRIX_BOT_USERNAME:-listener-bot}
      - MATRIX_BOT_PASSWORD=${MATRIX_BOT_PASSWORD}
    networks:
      - assistline-net
    depends_on:
      - dendrite
      - convex

  # 5. Convex Dashboard (web UI to inspect data, functions, logs)
  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: convex-dashboard
    restart: unless-stopped
    ports:
      - "6791:6791"
    environment:
      - CONVEX_BACKEND_URL=http://convex:3210
    networks:
      - assistline-net
    depends_on:
      - convex

  # 8. Tailscale Sidecar Proxy for the Vite Dashboard
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-sidecar
    hostname: dashboard
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ${ASSISTLINE_DATA:-./assistline-data}/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    networks:
      - assistline-net

  # 9. Dashboard App (Vite React)
  dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    container_name: dashboard-app
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks:
      - assistline-net
    depends_on:
      - tailscale

  # 10. Matrix Listener (syncs Dendrite events → Convex)
  matrix-listener:
    build:
      context: ..
      dockerfile: apps/listener/Dockerfile
    container_name: matrix-listener
    restart: unless-stopped
    environment:
      - MATRIX_HOMESERVER_URL=http://dendrite:8008
      - MATRIX_BOT_USERNAME=${MATRIX_BOT_USERNAME:-listener-bot}
      - MATRIX_BOT_PASSWORD=${MATRIX_BOT_PASSWORD}
      - DENDRITE_SERVER_NAME=${DENDRITE_SERVER_NAME:-matrix.local}
      - CONVEX_URL=http://convex:3210
    volumes:
      - ${ASSISTLINE_DATA:-./assistline-data}/listener:/app/data
      - matrix-shared:/shared
    networks:
      - assistline-net
    depends_on:
      - dendrite
      - assistline-init

networks:
  assistline-net:
    driver: bridge

volumes:
  matrix-shared:
  convex-shared:
